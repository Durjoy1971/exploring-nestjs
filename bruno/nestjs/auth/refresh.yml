info:
  name: Refresh
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:3000/auth/refresh
  auth: inherit
  body:
    type: json
    data: |-
      {
        "refresh_token": "<REFRESH_TOKEN_HERE>"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
