info:
  name: Register Admin
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:3000/auth/register-admin
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit
  body:
    type: json
    data: |-
      {
        "username": "admin_user",
        "password": "adminpassword123"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
